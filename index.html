<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GEO 品牌能见度监测平台 - AI 实战版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-blue-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between">
            <h1 class="text-xl font-bold">GEO 检索与 AI 能见度平台 (实时版)</h1>
            <span class="bg-green-500 px-3 py-1 rounded text-sm">DeepSeek AI 已就绪</span>
        </div>
    </nav>

    <div class="container mx-auto py-8 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="font-bold mb-4 text-blue-600 text-lg">✨ AI 智能内容创作</h3>
                <p class="text-sm text-gray-500 mb-4">输入你的品牌和产品，AI 将为你生成符合 GEO 逻辑的文案：</p>
                
                <input type="text" id="brandInput" placeholder="例如：极客跳动 软件开发" 
                       class="w-full p-3 border-2 border-blue-100 rounded-lg mb-4 focus:border-blue-500 outline-none">
                
                <button onclick="generateRealContent()" id="btnText"
                        class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                    立即生成铺设计划
                </button>

                <div id="resultArea" class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200 min-h-[200px] text-gray-700 whitespace-pre-wrap text-sm">
                    生成的文案将显示在这里...
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="font-bold mb-4 text-gray-800 text-lg">📊 品牌位次实时监测</h3>
                <canvas id="rankChart" height="150"></canvas>
                <div class="mt-6">
                    <h4 class="font-bold text-sm mb-2 text-gray-600">引用分析说明：</h4>
                    <div class="text-xs space-y-2 text-gray-500">
                        <p>✅ 豆包 (字节): 优先抓取抖音/头条信源 (高权重)</p>
                        <p>✅ Kimi/DeepSeek: 倾向于抓取新闻/知乎/官网链接</p>
                        <p>❌ 小红书: 目前 API 封闭，AI 无法直接抓取 (引用显示为0)</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 关键配置：在这里填入你的 API Key ---
        const DEEPSEEK_API_KEY = "sk-507cbe951a8a4b76a3083ac8b91a9273"; 

        async function generateRealContent() {
            const brandInput = document.getElementById('brandInput').value;
            const resultArea = document.getElementById('resultArea');
            const btnText = document.getElementById('btnText');

            if (!brandInput) {
                alert("请输入品牌信息！");
                return;
            }

            // 状态变更为加载中
            btnText.innerText = "AI 正在思考中...";
            btnText.disabled = true;
            resultArea.innerText = "正在链接 DeepSeek 脑库，请稍候...";

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {
                                role: "system", 
                                content: "你是一个GEO(生成式引擎优化)专家。请根据用户提供的品牌信息，生成一段结构清晰、包含核心关键词、利于被AI模型采信的推荐文案。"
                            },
                            {role: "user", content: brandInput}
                        ],
                        stream: false
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    resultArea.innerText = data.choices[0].message.content;
                } else {
                    resultArea.innerText = "出错了：" + (data.error ? data.error.message : "未知错误");
                }
            } catch (error) {
                resultArea.innerText = "连接 AI 失败，请检查网络或 API Key 是否正确。";
                console.error(error);
            } finally {
                btnText.innerText = "立即生成铺设计划";
                btnText.disabled = false;
            }
        }

        // 绘制图表逻辑
        const ctx = document.getElementById('rankChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                datasets: [{
                    label: '本品在AI回答中的位次',
                    data: [8, 6, 4, 5, 2, 3, 2],
                    borderColor: '#2563eb',
                    backgroundColor: 'rgba(37, 99, 235, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { scales: { y: { reverse: true, min: 1, max: 10 } } }
        });
    </script>
</body>
</html>
