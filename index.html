<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客跳动智算平台 - 生产环境</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --geek-red: #DA251C; }
        body { font-family: "PingFang SC", sans-serif; background-color: #f8fafc; }
        
        /* 侧边栏激活项居中放大 */
        .sub-menu { 
            padding: 0 1.5rem; font-size: 0.875rem; color: #64748b; cursor: pointer; 
            height: 40px; display: flex; align-items: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sub-menu.sidebar-active { 
            background-color: var(--geek-red); color: white !important; 
            justify-content: center; font-size: 1.125rem; font-weight: 700; height: 56px;
            box-shadow: 0 4px 12px rgba(218, 37, 28, 0.2);
        }
        
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--geek-red); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-800">

    <aside class="w-64 bg-white border-r flex flex-col shadow-xl z-20">
        <div class="p-6 border-b flex items-center space-x-3">
            <img src="logo.png" class="h-10 w-10 rounded-lg shadow-sm">
            <div>
                <p class="font-black text-sm tracking-tight">极客跳动</p>
                <p class="text-[10px] text-slate-400 font-bold uppercase">GeekDance Engine</p>
            </div>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <div class="px-6 py-2 text-[11px] font-bold text-slate-400 uppercase tracking-widest">GEO 核心速查</div>
            <div onclick="switchPage('page-dashboard', this)" class="sub-menu sidebar-active">品牌能见度智查</div>
            <div onclick="switchPage('page-batch', this)" class="sub-menu">多平台批量查</div>
            
            <div class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest">挖掘与管理</div>
            <div onclick="switchPage('page-mining', this)" class="sub-menu">提问词挖掘</div>
            <div onclick="switchPage('page-monitor', this)" class="sub-menu">打点管理</div>
            
            <div class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest">内容供应链</div>
            <div onclick="switchPage('page-plan', this)" class="sub-menu">供给计划</div>
            <div onclick="switchPage('page-editor', this)" class="sub-menu">高引用率创作</div>
            
            <div class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest">效果追踪</div>
            <div onclick="switchPage('page-trace', this)" class="sub-menu">AI 引用追踪</div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-[#fbfcfd]">
        <header class="h-16 bg-white border-b flex items-center justify-between px-10">
            <h2 id="current-title" class="font-bold text-lg text-slate-700">品牌能见度智查</h2>
            <div class="flex items-center space-x-4">
                <span class="text-xs text-slate-400">余额: ¥888.00</span>
                <div class="w-8 h-8 bg-slate-100 rounded-full border border-slate-200"></div>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto p-10">
            
            <div id="page-dashboard" class="page active max-w-5xl mx-auto">
                <div class="grid grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <p class="text-xs text-slate-400 mb-2">综合得分</p>
                        <p class="text-4xl font-black text-[#DA251C]">1010</p>
                    </div>
                    <div class="col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-around">
                        <canvas id="mainChart" style="max-width: 120px;"></canvas>
                        <div class="text-sm space-y-2">
                            <p>● 元宝: <span class="font-bold text-green-500">优</span></p>
                            <p>● 豆包: <span class="font-bold text-blue-500">良</span></p>
                        </div>
                    </div>
                </div>
                <button onclick="handleAPI('dashboard')" class="w-full bg-[#DA251C] text-white py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition">立即刷新全平台数据 (消耗 5 积分)</button>
            </div>

            <div id="page-batch" class="page max-w-4xl mx-auto">
                <div class="bg-white rounded-3xl p-8 shadow-sm border">
                    <textarea id="batchInput" class="w-full h-48 p-6 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-red-100 outline-none text-sm" placeholder="输入多个提问，每行一个..."></textarea>
                    <div class="flex items-center justify-between mt-6">
                        <div class="flex space-x-2">
                            <span class="px-3 py-1 bg-red-50 text-[#DA251C] text-[10px] rounded-full font-bold">✓ 豆包</span>
                            <span class="px-3 py-1 bg-red-50 text-[#DA251C] text-[10px] rounded-full font-bold">✓ 元宝</span>
                        </div>
                        <button onclick="handleAPI('batch')" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold flex items-center">
                            <div id="batch-loader" class="loading-spinner mr-2"></div>
                            <span>开始批量探测</span>
                        </button>
                    </div>
                </div>
            </div>

            <div id="page-mining" class="page max-w-4xl mx-auto">
                <div class="bg-white p-10 rounded-3xl shadow-sm border text-center">
                    <h3 class="text-2xl font-black mb-4">核心词挖掘矩阵</h3>
                    <input type="text" id="miningInput" class="w-full max-w-md px-6 py-4 bg-slate-50 rounded-xl mb-6 outline-none focus:ring-2 focus:ring-red-200" placeholder="输入品牌名，如：极客跳动">
                    <button onclick="handleAPI('mining')" class="block mx-auto bg-[#DA251C] text-white px-10 py-4 rounded-full font-bold shadow-lg">生成 AI 提问词</button>
                    <div id="miningResult" class="mt-10 grid grid-cols-2 gap-4 text-left"></div>
                </div>
            </div>

            <div id="page-monitor" class="page text-center py-20 text-slate-400 italic">打点监控模块正在同步数据...</div>
            <div id="page-plan" class="page text-center py-20 text-slate-400 italic">供给计划生成器就绪...</div>
            <div id="page-editor" class="page text-center py-20 text-slate-400 italic">编辑器 API 接入中...</div>
            <div id="page-trace" class="page text-center py-20 text-slate-400 italic">引用追踪系统在线...</div>

        </section>
    </main>

    <script>
        // 1. 路由切换逻辑
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('sidebar-active'));
            element.classList.add('sidebar-active');
            
            document.getElementById('current-title').innerText = element.innerText;
        }

        // 2. 核心 API 模拟/实战函数
        async function handleAPI(type) {
            const loader = document.getElementById('batch-loader');
            if(loader) loader.style.display = 'inline-block';

            // 这里是以后填入 API URL 的地方
            // const response = await fetch('https://api.yourdomain.com/v1/geo', { ... });
            
            // 模拟 1.5 秒的网络延迟
            setTimeout(() => {
                if(loader) loader.style.display = 'none';
                
                if(type === 'batch') {
                    alert("批量探测请求已发送！请在“打点管理”查看进度。");
                } else if(type === 'mining') {
                    const res = document.getElementById('miningResult');
                    res.innerHTML = `
                        <div class="p-4 bg-red-50 rounded-xl border border-red-100"><p class="text-xs font-bold text-red-700">场景 A：研发选型</p><p class="text-sm">“极客跳动的定制交付快吗？”</p></div>
                        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100"><p class="text-xs font-bold text-slate-700">场景 B：口碑对比</p><p class="text-sm">“对比极联软件，极客跳动优势在哪？”</p></div>
                    `;
                } else {
                    alert("数据已更新！");
                }
            }, 1500);
        }

        // 初始化图表
        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: [46, 54], backgroundColor: ['#DA251C', '#f1f5f9'], borderWidth: 0 }] },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
